name: Daily Auto Commit by 23f3003786@ds.study.iitm.ac.in

on:
  schedule:
    - cron: '0 9 * * *'  # Runs daily at 9:00 AM UTC (pick any specific time, not wildcards)
  workflow_dispatch:      # Lets you trigger manually for testing

permissions:          # ← ADD THIS BLOCK
  contents: write     # ← This gives push permission

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update status file by 23f3003786@ds.study.iitm.ac.in
        run: |
          echo "$(date): Daily automated update" > status.txt

      - name: Commit changes
        run: |
          git config user.name "Automated DevSync Bot"
          git config user.email "23f3003786@ds.study.iitm.ac.in"
          git add status.txt
          git commit -m "Daily update: $(date) [Automated by 23f3003786@ds.study.iitm.ac.in]" || echo "No changes"
          git push
